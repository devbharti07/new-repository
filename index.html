<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f6f6;
            padding: 20px;
        }
        .container {
            background: #f3f1f4;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            border-radius: 5px;
        }
        h2 {
            text-align: center;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        table, th, td {
            border: 1px solid #000;
        }
        th, td {
            padding: 8px;
            text-align: center;
        }
        .btn {
            background: #6dd2f1;
            color: #141414;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #f46969;
        }
        .invoice {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Invoice Generator</h2>

    <!-- User Details -->
    <h3>User Details</h3>
    <input type="text" id="name" placeholder="Customer Name">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="text" id="email" placeholder="Email Address">

    <!-- Product Details -->
    <h3>Product Details</h3>
    <input type="text" id="productName" placeholder="Product Name">
    <input type="number" id="quantity" placeholder="Quantity">
    <input type="number" id="price" placeholder="Price per Item">
    <button class="btn" onclick="addProduct()">Add Product</button>

    <!-- Product Table -->
    <table id="productTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="btn" onclick="generateInvoice()">Generate Bill</button>

    <!-- Invoice -->
    <div class="invoice" id="invoice"></div>
</div>

<script>
    let grandTotal = 0;

    function addProduct() {
        let pname = document.getElementById("productName").value;
        let qty = document.getElementById("quantity").value;
        let price = document.getElementById("price").value;

        if (pname === "" || qty === "" || price === "") {
            alert("Please fill all product fields");
            return;
        }

        let total = qty * price;
        grandTotal += total;

        let table = document.getElementById("productTable").getElementsByTagName('tbody')[0];
        let row = table.insertRow();

        row.insertCell(0).innerHTML = pname;
        row.insertCell(1).innerHTML = qty;
        row.insertCell(2).innerHTML = price;
        row.insertCell(3).innerHTML = total;

        document.getElementById("productName").value = "";
        document.getElementById("quantity").value = "";
        document.getElementById("price").value = "";
    }

    function generateInvoice() {
        let name = document.getElementById("name").value;
        let mobile = document.getElementById("mobile").value;
        let address = document.getElementById("email").value;

        if (name === "" || mobile === "" || address === "") {
            alert("Please fill user details");
            return;
        }

        document.getElementById("invoice").innerHTML = `
            <h3>Invoice</h3>
            <p><strong>Name:</strong> ${name}</p>
            <p><strong>Mobile:</strong> ${mobile}</p>
            <p><strong>Email:</strong> ${address}</p>
            <h3>Grand Total: ₹ ${grandTotal}</h3>
        `;
    }
</script>

</body>
</html>
